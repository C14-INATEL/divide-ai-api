configuration-as-code: {}
credentials:
  folder: {}
  providerImpl: {}
  system:
    domainCredentials:
      - credentials:
          - string:
              id: "DATABASE_URL"
              scope: GLOBAL
              secret: "${DATABASE_URL}"
          - string:
              id: "RENDER_SERVICE_ID"
              scope: GLOBAL
              secret: "${RENDER_SERVICE_ID}"
          - string:
              id: "RENDER_API_KEY"
              scope: GLOBAL
              secret: "${RENDER_API_KEY}"
        domain: {}
  user: {}
jenkins:
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  crumbIssuer: "standard"
  disableRememberMe: false
  labelAtoms:
    - name: "built-in"
  log: {}
  markupFormatter: "plainText"
  mode: NORMAL
  nodeMonitors:
    - "architecture"
    - "clock"
    - diskSpace:
        freeSpaceThreshold: "1GiB"
        freeSpaceWarningThreshold: "2GiB"
    - "swapSpace"
    - tmpSpace:
        freeSpaceThreshold: "1GiB"
        freeSpaceWarningThreshold: "2GiB"
    - "responseTime"
  numExecutors: 2
  primaryView:
    all:
      name: "all"
  projectNamingStrategy: "standard"
  quietPeriod: 5
  remotingSecurity:
    enabled: true
  scmCheckoutRetryCount: 0
  securityRealm:
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
        - id: "admin"
          name: "admin"
          properties:
            - "apiToken"
            - "consoleUrlProvider"
            - "viewsTabBar"
            - "mailer"
            - myView:
                viewsTabBar: "standard"
            - preferredProvider:
                providerId: "default"
            - "timezone"
            - "experimentalFlags"
  slaveAgentPort: 50000
  updateCenter:
    sites:
      - id: "default"
        url: "https://updates.jenkins.io/update-center.json"
  views:
    - all:
        name: "all"
  viewsTabBar: "standard"
globalCredentialsConfiguration:
  configuration:
    providerFilter: "none"
    typeFilter: "none"
appearance:
  consoleUrlProvider: {}
  prism:
    theme: PRISM
security:
  apiToken:
    creationOfLegacyTokenEnabled: false
    tokenGenerationOnCreationEnabled: false
    usageStatisticsEnabled: true
  apiTokenProperty: {}
  contentSecurityPolicy:
    enforce: false
  cps:
    hideSandbox: false
  crumb: {}
  gitHooks:
    allowedOnAgents: false
    allowedOnController: false
  gitHostKeyVerificationConfiguration:
    sshHostKeyVerificationStrategy: "knownHostsFileVerificationStrategy"
  prism:
    protectSourceCodeByPermission: false
  queueItemAuthenticator: {}
  scriptApproval:
    forceSandbox: false
  updateSiteWarningsConfiguration: {}
unclassified:
  administrativeMonitorsConfiguration: {}
  artifactManager: {}
  buildDiscarders:
    configuredBuildDiscarders:
      - "jobBuildDiscarder"
  casCGlobalConfig: {}
  computerRetentionCheckInterval: {}
  defaultDisplayUrlProvider: {}
  defaultFolderConfiguration: {}
  defaultView: {}
  envVarsFilter: {}
  fingerprints:
    fingerprintCleanupDisabled: false
    storage: "file"
  gitHubPluginConfig:
    hookUrl: "http://localhost:8080/github-webhook/"
  globalDefaultFlowDurabilityLevel: {}
  globalLibraries: {}
  globalUntrustedLibraries: {}
  location:
    adminAddress: "Endereço ainda não configurado"
  mailer:
    charset: "UTF-8"
    useSsl: false
    useTls: false
  myView: {}
  nodeProperties: {}
  pipeline-model-docker: {}
  plugin: {}
  pollSCM:
    pollingThreadCount: 10
  projectNamingStrategy: {}
  proxyConfigurationManager: {}
  quietPeriod: {}
  resourceRoot: {}
  scmGit:
    addGitTagAction: false
    allowSecondFetch: false
    createAccountBasedOnEmail: false
    disableGitToolChooser: false
    hideCredentials: false
    showEntireCommitSummaryInChanges: false
    useExistingAccountWithSameEmail: false
  scmRetryCount: {}
  shell: {}
  usageStatistics: {}
  viewsTabBar: {}
tool:
  git:
    installations:
      - home: "git"
        name: "Default"
  mavenGlobalConfig:
    globalSettingsProvider: "standard"
    settingsProvider: "standard"
